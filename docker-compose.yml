version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  redis:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "Your_Redis_Password_123"]
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=Chinese_Sale;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379,password=Your_Redis_Password_123
      - Redis__GiftCacheTtlSeconds=60
      - jwtSettings__SecretKey=ChineseSaleApiSecretKeyBtAvigail
      - jwtSettings__Issuer=ChineseSale
      - jwtSettings__Audience=ChineseSaleApiClient
      - jwtSettings__ExpiryMinutes=60
    restart: unless-stopped

volumes:
  mssql_data: {}